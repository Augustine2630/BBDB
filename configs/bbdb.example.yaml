# BBDB example configuration
# All values shown are defaults. Override via env: BBDB_<SECTION>__<KEY>

data:
  pebble_dir: ./pebble
  tmp_dir: ./tmp

tiers:
  hot:
    root: ./tiers/hot
  warm:
    root: ./tiers/warm
  cold:
    root: ./tiers/cold

ingestion:
  batch_interval: 2ms
  ring_buf_size: 16384
  max_block_bytes: 268435456  # 256 MiB; size-triggered seal

block:
  bloom_fpr: 0.01       # bloom filter false-positive rate per block
  idx_chunk_size: 100000  # pebble NoSync batch size for sparse index writes

query:
  max_parallel: 8
  bloom_cache_bytes: 67108864   # 64 MiB

ttl:
  retention_period: 43800h  # 5 years (5 * 365 * 24h); blocks are deleted after this period
  reaper_interval: 10m
  reaper_max_deletes_per_sec: 100
  janitor_interval: 1h
  shutdown_timeout: 30s  # max wait for reaper/janitor to stop before force-close

grpc:
  listen_addr: ":7070"

log:
  level: info          # debug | info | warn | error
  format: text         # text | json | json-ecs
  file:
    path: "./bbdb.log"           # "" = stdout only; set path to enable file output
    max_size_mb: 100
    max_backups: 5
    max_age_days: 30
    compress: true
